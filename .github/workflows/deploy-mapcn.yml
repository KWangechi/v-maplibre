name: Deploy mapcn-vue

on:
  workflow_call:
    inputs:
      skip-build:
        description: 'Download build artifact from CI instead of rebuilding'
        default: false
        required: false
        type: boolean
  workflow_dispatch:

concurrency:
  group: deploy-mapcn-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to Cloudflare Pages
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      deployments: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Download build artifact
        if: inputs.skip-build == true
        uses: actions/download-artifact@v8
        with:
          name: mapcn-dist
          path: apps/mapcn-vue/dist/

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build library
        if: inputs.skip-build != true
        run: bun run --cwd packages/v-maplibre build
        env:
          NODE_OPTIONS: --max-old-space-size=8192

      - name: Generate ProMap data
        if: inputs.skip-build != true
        run: bun run apps/mapcn-vue/scripts/prepare-promap-data.ts

      - name: Build mapcn-vue
        if: inputs.skip-build != true
        run: bun run build:mapcn
        env:
          NODE_OPTIONS: --max-old-space-size=8192
          NITRO_PRESET: cloudflare-pages
          NUXT_PUBLIC_MAPSGURU_API_KEY: ${{ secrets.NUXT_PUBLIC_MAPSGURU_API_KEY }}

      - name: Deploy to Cloudflare Pages
        working-directory: apps/mapcn-vue
        run: bun x wrangler pages deploy dist --project-name=mapcn-vue
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
